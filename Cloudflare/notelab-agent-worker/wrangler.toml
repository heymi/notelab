name = "notelab-agent"
main = "src/index.ts"
compatibility_date = "2026-06-20"

routes = [
  { pattern = "notelab.aedc.cc", custom_domain = true }
]

[vars]
ALLOW_WRITE = "true"

[[d1_databases]]
binding = "AI_DB"
database_name = "notelab-ai"
database_id = "24346b90-0e77-44fa-87db-5b02712a7051"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "NoteLabRelay"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NoteLabRelay"]
